<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sopa de ajo – Recetas simples</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">← Menú</a>
      </div>
    </nav>
  </header>

  <div class="titulo-receta">
    <h1>Sopa de ajo</h1>
  </div>

  <div class="receta-wrapper">

    <div class="card-ingredientes">
      <h2>Ingredientes</h2>
      <ul class="ingredientes">
        <li>4 dientes de ajo</li>
        <li>Chorizo y/o jamón en tacos</li>
        <li>Pan duro o tostado</li>
        <li>1 huevo</li>
        <li class="sub">3 hojas de laurel, 1 cucharadita de pimentón dulce y/o picante, ½ cubo de caldo de carne</li>
        <li class="sub">Opcional: tomillo, romero…</li>
      </ul>
    </div>

    <div class="card-instrucciones">
      <h2>Preparación</h2>
      <div class="paso">
        <input type="checkbox" id="paso1" />
        <label for="paso1">
          <b>Sofreír.</b> Echar un chorro de aceite y sofreír el <mark>ajo</mark>, la
          <mark>carne</mark> y el <mark>pan</mark>.
        </label>
      </div>
      <div class="paso">
        <input type="checkbox" id="paso2" />
        <label for="paso2">
          <b>Hervir.</b> Añadir dos vasos de <mark>agua</mark> y las <mark>especias</mark>.
          Hervir 20 minutos a fuego muy lento.
        </label>
      </div>
      <div class="paso">
        <input type="checkbox" id="paso3" />
        <label for="paso3">
          <b>Reposar.</b> Añadir el <mark>huevo</mark> con el fuego apagado y reposar 10 min.
        </label>
      </div>
    </div>

    <img class="imagen-receta" src="https://cdn.glitch.global/fb25a3ae-8a7b-4e85-be46-53018fcb8de1/image12.jpg?v=1672221032483" alt="Sopa de ajo" />

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2JD1N/z7y6/5OBU+cF1JigU2wRAKcF5dKTFJc0y2z8pp7rfH5G8pJfH/Xg" crossorigin="anonymous"></script>
</body>
</html>
