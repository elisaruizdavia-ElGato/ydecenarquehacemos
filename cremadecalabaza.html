<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crema de calabaza – Recetas simples</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
        integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">← Menú</a>
      </div>
    </nav>
  </header>

  <div class="titulo-receta">
    <h1>Crema de calabaza</h1>
  </div>

  <div class="receta-wrapper">

    <!-- Ingredientes -->
    <div class="card-ingredientes">
      <h2>Ingredientes</h2>
      <ul class="ingredientes">
        <li>500 g de calabaza</li>
        <li>1 cebolla (o cebolleta)</li>
        <li>1 zanahoria (y/o manzana)</li>
        <li>½ cubo de caldo de verdura</li>
        <li>1 cucharada grande de queso de untar (o 100 ml de nata)</li>
        <li>Especias: pimienta, cúrcuma, jengibre</li>
      </ul>
    </div>

    <!-- Pasos -->
    <div class="card-instrucciones">
      <h2>Preparación</h2>

      <div class="paso">
        <input type="checkbox" id="paso1" />
        <label for="paso1">
          <b>Hervir en un cazo.</b> Echar la <mark>calabaza, cebolleta y zanahoria</mark>
          troceadas junto al <mark>cubo de verdura</mark>. Cubrir con agua (no mucha, para no
          tener que tirar después). Cocer unos 20 min.
        </label>
      </div>

      <div class="paso">
        <input type="checkbox" id="paso2" />
        <label for="paso2">
          <b>Triturar.</b> Con la batidora, triturar todo junto al <mark>queso de untar (o nata)</mark>
          controlando la textura. Decorar con un chorro de <mark>aceite y las especias</mark>.
        </label>
      </div>
    </div>

    <!-- Imagen -->
    <img
      class="imagen-receta"
      src="imagenes/cremadecalabaza.jpg"
      alt="Crema de calabaza"
    />

  </div><!-- /receta-wrapper -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-OERcA2JD1N/z7y6/5OBU+cF1JigU2wRAKcF5dKTFJc0y2z8pp7rfH5G8pJfH/Xg" crossorigin="anonymous"></script>
</body>
</html>
