<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- CAMBIAR: nombre de la receta -->
  <title>NOMBRE RECETA – Recetas simples</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
        integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">← Menú</a>
      </div>
    </nav>
  </header>

  <!-- CAMBIAR: nombre de la receta -->
  <div class="titulo-receta">
    <h1>NOMBRE RECETA</h1>
  </div>

  <div class="receta-wrapper">

    <!-- ========================
         INGREDIENTES
         Añade o quita <li> según necesites.
         Para subapartados (especias, etc.) añade class="sub" al <li>
    ========================= -->
    <div class="card-ingredientes">
      <h2>Ingredientes</h2>
      <ul class="ingredientes">
        <li>Ingrediente 1</li>
        <li>Ingrediente 2</li>
        <li>Ingrediente 3</li>
        <!-- Ejemplo subapartado: -->
        <!-- <li class="sub">Especias: laurel, pimentón</li> -->
      </ul>
    </div>

    <!-- ========================
         PASOS
         Duplica el bloque .paso para cada paso.
         Cambia id="pasoN" incrementando el número.
         Usa <mark>palabra clave</mark> para resaltar en amarillo.
    ========================= -->
    <div class="card-instrucciones">
      <h2>Preparación</h2>

      <div class="paso">
        <input type="checkbox" id="paso1" />
        <label for="paso1">
          <b>Título del paso.</b> Descripción del paso con <mark>ingredientes clave</mark> resaltados.
        </label>
      </div>

      <div class="paso">
        <input type="checkbox" id="paso2" />
        <label for="paso2">
          <b>Título del paso.</b> Descripción del paso con <mark>ingredientes clave</mark> resaltados.
        </label>
      </div>

      <!-- Añade más pasos copiando el bloque .paso de arriba -->

    </div>

    <!-- ========================
         IMAGEN (opcional)
         Cambia src por la URL de tu imagen.
         Si no tienes imagen, borra este bloque.
    ========================= -->
    <img
      class="imagen-receta"
      src="URL_DE_TU_IMAGEN"
      alt="NOMBRE RECETA"
    />

  </div><!-- /receta-wrapper -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-OERcA2JD1N/z7y6/5OBU+cF1JigU2wRAKcF5dKTFJc0y2z8pp7rfH5G8pJfH/Xg" crossorigin="anonymous"></script>
</body>
</html>
