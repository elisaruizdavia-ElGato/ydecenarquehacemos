<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arroz de marisco – Recetas simples</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">← Menú</a>
      </div>
    </nav>
  </header>

  <div class="titulo-receta">
    <h1>Arroz de marisco</h1>
  </div>

  <div class="receta-wrapper">

    <div class="card-ingredientes">
      <h2>Ingredientes</h2>
      <ul class="ingredientes">
        <li>180 g de arroz</li>
        <li>300 ml de fumet o caldo para paella de marisco</li>
        <li>½ bandeja de marisco congelado</li>
        <li>2 cucharadas de tomate frito</li>
        <li>3 dientes de ajo</li>
      </ul>
    </div>

    <div class="card-instrucciones">
      <h2>Preparación</h2>
      <div class="paso">
        <input type="checkbox" id="paso1" />
        <label for="paso1">
          <b>En el paellero.</b> Calentar un chorro de <mark>aceite</mark> y echar los
          <mark>ajos</mark> pelados cortados a lo largo, el <mark>marisco</mark> y el
          <mark>tomate frito</mark>. Cuando esté dorado echar el <mark>fumet</mark>
          y hervir bajo 15 min.
        </label>
      </div>
      <div class="paso">
        <input type="checkbox" id="paso2" />
        <label for="paso2">
          <b>Echar el arroz.</b> Echar el <mark>arroz</mark> y apagar en 15 min. Ir añadiendo
          <mark>agua</mark> si hace falta para que al apagar quede una mezcla caldosa que chisporrotea.
          Reposar 10 min.
        </label>
      </div>
    </div>

    <img class="imagen-receta" src="https://cdn.glitch.global/fb25a3ae-8a7b-4e85-be46-53018fcb8de1/image25.jpg?v=1672222708066" alt="Arroz de marisco" />

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2JD1N/z7y6/5OBU+cF1JigU2wRAKcF5dKTFJc0y2z8pp7rfH5G8pJfH/Xg" crossorigin="anonymous"></script>
</body>
</html>
