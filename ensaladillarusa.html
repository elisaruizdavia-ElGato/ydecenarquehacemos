<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ensaladilla rusa – Recetas simples</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">← Menú</a>
      </div>
    </nav>
  </header>

  <div class="titulo-receta">
    <h1>Ensaladilla rusa</h1>
  </div>

  <div class="receta-wrapper">

    <div class="card-ingredientes">
      <h2>Ingredientes</h2>
      <ul class="ingredientes">
        <li>2 patatas medianas (400 g)</li>
        <li>2 huevos duros</li>
        <li>2 latas de atún</li>
        <li>2 cucharadas de mayonesa</li>
      </ul>
    </div>

    <div class="card-instrucciones">
      <h2>Preparación</h2>
      <div class="paso">
        <input type="checkbox" id="paso1" />
        <label for="paso1">
          <b>En un cazo.</b> Hervir la <mark>patata</mark> a trozos 20 minutos hasta que queden blandas.
          Poner en un bol y dejar enfriar.
        </label>
      </div>
      <div class="paso">
        <input type="checkbox" id="paso2" />
        <label for="paso2">
          <b>En el bol.</b> Echar los <mark>huevos duros</mark> cortados a trozos, el <mark>atún</mark>
          y 2 cucharadas muy colmadas de <mark>mayonesa</mark>. Remover con la cuchara.
        </label>
      </div>
      <div class="paso">
        <input type="checkbox" id="paso3" />
        <label for="paso3">
          <b>Servir.</b> Servir frío con un cuenquito de <mark>picos</mark>. Si se quiere convertir en marinera,
          poner sobre una rosquilla y colocar una anchoa encima.
        </label>
      </div>
    </div>

    <img class="imagen-receta" src="imagenes/marineras.jpg"/>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2JD1N/z7y6/5OBU+cF1JigU2wRAKcF5dKTFJc0y2z8pp7rfH5G8pJfH/Xg" crossorigin="anonymous"></script>
</body>
</html>
