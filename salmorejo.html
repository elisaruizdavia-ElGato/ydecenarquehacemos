<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Salmorejo – Recetas simples</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">← Menú</a>
      </div>
    </nav>
  </header>

  <div class="titulo-receta">
    <h1>Salmorejo</h1>
  </div>

  <div class="receta-wrapper">

    <div class="card-ingredientes">
      <h2>Ingredientes</h2>
      <ul class="ingredientes">
        <li>1 bote de tomate entero pelado</li>
        <li>1 rebanada de pan duro o tostado</li>
        <li>½ diente de ajo</li>
        <li>1 huevo duro</li>
        <li>Jamón serrano a tacos</li>
        <li>5 hojas frescas de albahaca</li>
      </ul>
    </div>

    <div class="card-instrucciones">
      <h2>Preparación</h2>
      <div class="paso">
        <input type="checkbox" id="paso1" />
        <label for="paso1">
          <b>En la batidora.</b> Echar los <mark>tomates</mark> (sin el caldo), el <mark>pan</mark>,
          el <mark>ajo</mark>, un <mark>chorro de aceite</mark>, <mark>sal</mark> y la <mark>albahaca</mark>.
          Triturar hasta obtener textura cremosa.
        </label>
      </div>
      <div class="paso">
        <input type="checkbox" id="paso2" />
        <label for="paso2">
          <b>Emplatar.</b> Echar el <mark>huevo y el jamón</mark> por encima. Decorar con una hoja de hierbabuena y un chorro de aceite.
        </label>
      </div>
    </div>

    <img class="imagen-receta" src="https://cdn.glitch.global/fb25a3ae-8a7b-4e85-be46-53018fcb8de1/salmorejo.jpg?v=1675094800832" alt="Salmorejo" />

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2JD1N/z7y6/5OBU+cF1JigU2wRAKcF5dKTFJc0y2z8pp7rfH5G8pJfH/Xg" crossorigin="anonymous"></script>
</body>
</html>
