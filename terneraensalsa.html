<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ternera en salsa – Recetas simples</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">← Menú</a>
      </div>
    </nav>
  </header>

  <div class="titulo-receta">
    <h1>Ternera en salsa</h1>
  </div>

  <div class="receta-wrapper">

    <div class="card-ingredientes">
      <h2>Ingredientes (para 2 personas)</h2>
      <ul class="ingredientes">
        <li>500 g de filetes de ternera</li>
        <li>1 cebolla</li>
        <li>¼ de puerro</li>
        <li>4 dientes de ajo</li>
        <li>4 champiñones laminados</li>
        <li>½ tomate</li>
        <li>2 zanahorias</li>
        <li class="sub">2 hojas de laurel, 1 cubo de caldo de verduras, 2 cucharadas de harina</li>
      </ul>
    </div>

    <div class="card-instrucciones">
      <h2>Preparación</h2>
      <div class="paso">
        <input type="checkbox" id="paso1" />
        <label for="paso1">
          <b>Sofreír en la olla.</b> Echar un chorro de <mark>aceite de oliva</mark> y dorar los
          <mark>filetes</mark> (si quedan trozos rojos no pasa nada). Sacarlos y pochar la
          <mark>cebolla</mark>, el <mark>ajo</mark>, el <mark>puerro</mark>, los
          <mark>champiñones</mark>, la <mark>zanahoria</mark> y el <mark>tomate</mark>
          todo cortado a trozos pequeños.
        </label>
      </div>
      <div class="paso">
        <input type="checkbox" id="paso2" />
        <label for="paso2">
          <b>Hervir en la olla.</b> Echar los <mark>filetes</mark> que habíamos apartado,
          un chorro de <mark>vino blanco</mark>, la <mark>harina</mark> y el
          <mark>cubo de caldo de verduras</mark>. Cerrar la olla y dejar 20 min a fuego bajo.
        </label>
      </div>
    </div>

    <img class="imagen-receta" src="imagenes/terneraensalsa.jpg"/>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2JD1N/z7y6/5OBU+cF1JigU2wRAKcF5dKTFJc0y2z8pp7rfH5G8pJfH/Xg" crossorigin="anonymous"></script>
</body>
</html>
